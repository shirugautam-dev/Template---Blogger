<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My Blog</title>
  <link rel="stylesheet" href="style.css">
  <link rel="alternate" type="application/rss+xml" title="RSS Feed" href="/rss.xml">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <!-- SEO -->
<meta name="description" content="Thoughtful reflections, book reviews, and personal essays by Srijana.">

<!-- Open Graph (Facebook, LinkedIn) -->
<meta property="og:title" content="Srijana’s thoughts">
<meta property="og:description" content="Thoughtful reflections, book reviews, and personal essays.">
<meta property="og:image" content="https://shirugautam-dev.github.io/Images/Self_org.jpg">
<meta property="og:url" content="https://shirugautam-dev.github.io/">
<meta property="og:type" content="website">

<!-- Twitter -->
<meta name="twitter:card" content="summary_large_image">
<meta name="twitter:title" content="Srijana’s thoughts">
<meta name="twitter:description" content="Thoughtful reflections and book reviews.">
<meta name="twitter:image" content="https://shirugautam-dev.github.io/Images/Self_org.jpg">
</head>



<body>

  <div class="container">
    <button id="theme-toggle">🌙</button>
    <section class="hero">
  <h1 id="site-title">Minimal Blog Template</h1>
  <p class="tagline">
    A clean, fast, and modern blog template for developers.
  </p>
</section>
    <section class="intro">
  <img src="Images/Self_org.jpg" alt="author">
  <p>
    Welcome! This is a demo blog template you can customize easily.
  </p>
</section>

    <section class="rss">
     <p class="top-info"><a href="rss.xml">Follow via RSS</a></p>
     <p class="contact-info">connect with me: shiru.gautam@gmail.com</p>
    </section>

    <div class="content">
      <main class="posts" id="articles"></main>
    </div>  
    <script src="js/config.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/marked/4.3.0/marked.min.js"></script>
    <script src="js/articles.js"></script>
    <script src="js/article-loader.js"></script>

    <script>
  const toggle = document.getElementById("theme-toggle");

  // Load saved theme
  if (localStorage.getItem("theme") === "dark") {
    document.body.classList.add("dark");
    toggle.textContent = "☀️";
  }

  toggle.addEventListener("click", () => {
    document.body.classList.toggle("dark");

    if (document.body.classList.contains("dark")) {
      localStorage.setItem("theme", "dark");
      toggle.textContent = "☀️";
    } else {
      localStorage.setItem("theme", "light");
      toggle.textContent = "🌙";
    }
  });
</script>
</body>

</html>
